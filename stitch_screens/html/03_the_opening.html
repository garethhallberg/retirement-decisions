<style>
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .blinking-cursor {
            display: inline-block;
            width: 2px;
            height: 1.1em;
            background-color: #775a19;
            margin-left: 4px;
            vertical-align: middle;
            animation: blink 1.2s step-end infinite;
        }
        body {
            background-color: #fbf9f4; /* Using the exact DS surface color which matches the warm paper intent */

<body class="bg-surface text-on-surface antialiased selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col justify-center items-center overflow-hidden">
<!-- 
      THE OPENING CANVAS 
      This is a focused, transactional-entry screen. 
      Per the "Semantic Shell Mandate", navigation shells (TopNavBar, SideNav, BottomNavBar) 
      are suppressed to prioritize the singular focus of the user's intent.
    -->
<main class="w-full max-w-5xl px-12 md:px-24 flex flex-col items-center justify-center">
<!-- Intentional Asymmetry: The prompt is centered, but we leave breathing room for the sensory experience -->
<div class="relative w-full text-center">
<!-- Large Serif Type: "The Digital Archivist" Hero Statement -->
<h1 class="font-headline font-light text-4xl md:text-6xl lg:text-7xl leading-tight tracking-tight text-on-surface">
                What does a great day look like for you?
                <span class="blinking-cursor"></span>
</h1>
<!-- Hidden Accessibility Input: Ensures the field is focusable while maintaining the "Editorial" illusion -->
<div class="mt-12 opacity-0 focus-within:opacity-100 transition-opacity duration-700">
<input autofocus="" class="w-full max-w-lg bg-transparent border-0 border-b border-outline-variant focus:border-primary focus:ring-0 text-center font-body text-lg py-4 placeholder:text-outline-variant/50 outline-none" placeholder="Begin writing..." type="text"/>
</div>
</div>
</main>
<!-- Visual Anchor: Subtle brand presence at the bottom, as if a footer on a high-end stationery -->
<footer class="fixed bottom-12 left-0 w-full flex justify-center pointer-events-none">
<div class="font-label text-[10px] uppercase tracking-[0.4em] text-on-surface/20">
            The Archivist — Vol. I
        </div>
</footer>
